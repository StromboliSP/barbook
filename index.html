<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birdyard — Tischreservierung</title>

<link rel="icon" type="image/jpeg" href="Logo_TheBirdYard_SOLO.jpg">
<link rel="apple-touch-icon" href="Logo_TheBirdYard_SOLO.jpg">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@900&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: rgba(255,255,255,0.8);
    --accent-dim: rgba(255,255,255,0.06);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.4);
    --border: rgba(255,255,255,0.18);
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.03);
    --success: #55aa77;
    --danger: rgba(220,100,100,0.9);
    
    /* barbook Logo Variables */
    --brand-main: #9cb08f; 
    --brand-dark: #7a8f6d; 
    --page-color: #fbf8ef; 
    --text-color: #18181b; 
    --anim-duration: 6s; 
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: url('https://i.imgur.com/vDRf0fc.jpg') center center / cover fixed no-repeat;
    color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
    font-size: clamp(13px, 1.1vw, 17px);
  }
  main { display:flex; align-items:flex-start; justify-content:center; padding:0 1rem 3rem; width:100%; }
  
  .card-header {
    background: #2e2a24;
    height: 75px; 
    position: relative;
    border-bottom: 1px solid rgba(0,0,0,0.25);
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .card-header-logo-box {
    position: absolute;
    top: 25px; 
    left: 1.8rem; 
    z-index: 20;
    width: 90px; height: 90px;
    background: #1a1510;
    border: 1px solid rgba(180,145,80,0.35);
    box-shadow: 0 0 12px rgba(180,145,80,0.15), inset 0 0 8px rgba(0,0,0,0.4);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .card-header-logo { width:82px; height:82px; object-fit:contain; display:block; }
  
  .card-header-barbook {
    padding-right: 1.8rem;
    height: 100%;
    display: flex;
    align-items: center;
  }
  .card-header-barbook svg {
    height: 55px;
    width: auto;
    display: block;
  }

  .main-card {
    display:grid; grid-template-columns:1fr;
    width:100%; max-width:480px;
    background:#e8dcc8;
    box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(122,92,42,0.2);
    overflow:hidden;
  }
  
  .calendar-panel { 
    padding: 3.8rem 1.8rem 1.6rem; 
    border-bottom: 1px solid rgba(122,92,42,0.15); 
    background: #e8dcc8; 
  }
  .form-panel { 
    padding: 3.8rem 1.8rem 1.6rem; 
    background: #ede3d2; 
  }

  @media (min-width:900px) {
    body { font-size: clamp(13px, 1.1vw, 18px); }
    main {
      padding: clamp(1.5rem, 4vh, 4rem) clamp(1rem, 3vw, 3rem);
      align-items: center; min-height: 100vh;
    }
    .main-card {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      max-width: clamp(700px, 68vw, 1000px);
      width: 100%;
    }
    .card-header {
      grid-column: 1 / -1;
      height: 90px;
    }
    .card-header-logo-box {
      top: 30px;
      left: clamp(1.4rem, 2vw, 2.2rem);
      width: clamp(80px, 7vw, 110px);
      height: clamp(80px, 7vw, 110px);
    }
    .card-header-logo {
      width: clamp(72px, 6.5vw, 98px);
      height: clamp(72px, 6.5vw, 98px);
    }
    .card-header-barbook svg {
      height: 65px; 
    }
    .calendar-panel {
      border-bottom: none;
      border-right: 1px solid rgba(122,92,42,0.15);
      padding: 4.5rem clamp(1.2rem, 1.8vw, 2.2rem) clamp(1.2rem, 1.8vw, 2.2rem);
      background: #e8dcc8;
    }
    .form-panel {
      padding: 4.5rem clamp(1.2rem, 1.8vw, 2.2rem) clamp(1.2rem, 1.8vw, 2.2rem);
      background: #ede3d2;
    }
  }

  .cal-wrapper {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(122,92,42,0.2);
    padding: 1.2rem;
    margin-bottom: 1.4rem;
  }
  
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; }
  .cal-month { font-family:'DM Sans',sans-serif; font-size:0.62rem; font-weight:400; letter-spacing:0.3em; text-transform:uppercase; color:#8a7560; }
  .cal-nav { display:flex; gap:0.3rem; }
  .cal-nav button {
    background:transparent; border:1px solid rgba(122,92,42,0.25);
    color:#8a7560; width:26px; height:26px; border-radius:0;
    cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-day-label { text-align:center; font-size:0.6rem; font-weight:400; letter-spacing:0.07em; text-transform:uppercase; color:#8a7560; padding-bottom:0.4rem; }
  .cal-day {
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:0; cursor:pointer; position:relative; font-size:0.82rem; transition:all 0.12s;
    border:1px solid transparent; color:#2a1f0e;
  }
  .cal-day.selected { background:rgba(122,92,42,0.15); border-color:#7a5c2a; font-weight:600; }
  .cal-day.today { color:#7a5c2a; font-weight:700; }
  .cal-day.today::after { content:''; width:3px; height:3px; border-radius:50%; background:#7a5c2a; position:absolute; bottom:2px; }
  .cal-day.past { color:#8a7560; opacity:0.45; }
  .cal-day.closed { color:#8a7560; opacity:0.3; text-decoration:line-through; }

  /* Dropdown Calendar - Heller, Kompakter, Bessere Schrift */
  .date-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:#ffffff; border:1px solid rgba(122,92,42,0.2);
    border-radius:0; z-index:50; box-shadow:0 8px 30px rgba(0,0,0,0.15);
    padding:0.6rem; display:none;
  }
  .date-dropdown.open { display:block; }
  .dd-cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.4rem; }
  .dd-cal-month { font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600; color:#2a1f0e; letter-spacing:0.02em; }
  .dd-nav button {
    background:transparent; border:1px solid rgba(122,92,42,0.15); color:#8a7560;
    width:24px; height:24px; cursor:pointer; font-size:0.8rem;
    display:flex; align-items:center; justify-content:center;
  }
  .dd-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
  .dd-label { text-align:center; font-size:0.55rem; font-weight:600; text-transform:uppercase; color:#8a7560; padding-bottom:0.3rem; }
  .dd-day { 
    aspect-ratio:1; display:flex; align-items:center; justify-content:center; 
    font-size:0.85rem; font-weight:500; color:#2a1f0e; cursor:pointer;
  }
  .dd-day:hover:not(.dd-empty):not(.dd-past):not(.dd-closed) { background:#f8f4ed; }
  .dd-day.dd-selected { background:#7a5c2a; color:#fff; font-weight:600; }
  .dd-day.dd-today { color:#7a5c2a; font-weight:800; border-bottom: 2px solid #7a5c2a; }
  .dd-day.dd-past { color:#ccc; cursor:default; }
  .dd-day.dd-closed { color:#ddd; text-decoration:line-through; cursor:not-allowed; }

  /* Form */
  .panel-title { font-family:'DM Sans',sans-serif; font-size:0.62rem; font-weight:400; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:0.2rem; color:#8a7560; }
  .date-trigger {
    background:rgba(122,92,42,0.08); border:1px solid rgba(122,92,42,0.2);
    padding:0.5rem 0.7rem; margin-bottom:0.9rem;
    font-size:0.82rem; color:#2a1f0e; display:flex; align-items:center;
    gap:0.5rem; cursor:pointer; position:relative;
  }
  .dd-arrow { margin-left:auto; font-size:0.6rem; opacity:0.5; transition:transform 0.2s; }
  .dd-arrow.open { transform:rotate(180deg); }

  .form-group { margin-bottom:0.9rem; }
  label { display:block; font-size:0.63rem; font-weight:400; letter-spacing:0.1em; text-transform:uppercase; color:#8a7560; margin-bottom:0.3rem; }
  input, select, textarea {
    width:100%; background:rgba(255,255,255,0.5); border:1px solid rgba(122,92,42,0.2);
    padding:0.5rem 0.7rem; color:#2a1f0e; font-family:'DM Sans',sans-serif; font-size:0.82rem;
    outline:none; appearance:none;
  }
  .btn-primary {
    width:100%; background:#1a1510; color:rgba(235,220,195,0.9);
    border:1px solid rgba(235,220,195,0.35); padding:0.8rem;
    font-family:'DM Sans',sans-serif; font-size:0.68rem;
    letter-spacing:0.25em; text-transform:uppercase; cursor:pointer;
    transition:all 0.2s; margin-top:0.6rem;
  }
  .btn-primary:hover { border-color:rgba(235,220,195,0.75); color:#fff; background:#0d0b08; }

  /* Review Rotator - Stabilisierte Höhe */
  .review-rotator {
    padding: 1.2rem 1.4rem;
    border: 1px solid rgba(122,92,42,0.2);
    min-height: 145px; /* Verlängert für mehr Stabilität */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    background: rgba(255,255,255,0.5);
    overflow: hidden;
  }
  .review-slot {
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.4s ease, transform 0.4s ease-out;
  }
  .review-slot.visible { opacity: 1; transform: translateX(0); }
  .review-stars-sm { color: #c8902a; font-size: 0.8rem; margin-bottom: 0.6rem; }
  .review-quote { font-size: 0.9rem; color: #4a3820; line-height: 1.6; font-style: italic; }

  /* Logo Animations (Once) */
  .cover-bottom-layer { animation: flipCover var(--anim-duration) 1 forwards, toggleBottom var(--anim-duration) 1 forwards; }
  .cover-top-layer { animation: flipCover var(--anim-duration) 1 forwards, toggleTop var(--anim-duration) 1 forwards; }
  .brand-text {
    font-family: 'Montserrat', sans-serif; font-size: 45px; font-weight: 900; 
    text-transform: uppercase; fill: var(--text-color); opacity: 0;
    animation: textFade var(--anim-duration) 1 forwards;
  }

  @keyframes flipCover {
    0%, 15% { transform: rotateY(0deg); } 25% { transform: rotateY(-90deg); } 40%, 100% { transform: rotateY(-180deg); } 
  }
  @keyframes toggleBottom { 0%, 24.99% { opacity: 0; } 25%, 100% { opacity: 1; } }
  @keyframes toggleTop { 0%, 24.99% { opacity: 1; } 25%, 100% { opacity: 0; } }
  @keyframes textFade {
    0%, 35% { opacity: 0; transform: translateY(6px); } 45%, 100% { opacity: 1; transform: translateY(0); } 
  }

  /* Toasts, Popups, Modals... */
  .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:#e8dcc8; border:1px solid rgba(122,92,42,0.2); padding:0.8rem 1.2rem; display:flex; align-items:center; gap:0.75rem; z-index:1000; transform:translateY(80px); opacity:0; transition:all 0.35s; max-width:290px; color:#2a1f0e; }
  .toast.show { transform:translateY(0); opacity:1; }
  .booking-popup{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:500;}
  .booking-popup.open{display:flex;}
  .booking-popup-card{background:#e8dcc8;padding:2rem;width:92%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
</style>
</head>
<body>
<main>
  <div class="main-card">
    <div class="card-header">
      <div class="card-header-logo-box">
        <img src="Logo_TheBirdYard_SOLO.jpg" alt="The Birdyard" class="card-header-logo">
      </div>
      <div class="card-header-barbook">
        <svg viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg">
            <g class="cover-bottom-layer">
                <rect x="200" y="68" width="145" height="214" fill="var(--brand-dark)" rx="4" />
                <rect x="200" y="75" width="125" height="200" fill="var(--page-color)" rx="2" />
            </g>
            <rect x="200" y="68" width="145" height="214" fill="var(--brand-dark)" rx="4" />
            <rect x="200" y="75" width="125" height="200" fill="var(--page-color)" rx="2" />
            <g class="cover-top-layer">
                <rect x="200" y="68" width="145" height="214" fill="var(--brand-main)" rx="4" />
            </g>
            <text x="200" y="188" text-anchor="middle" class="brand-text">barbook</text>
        </svg>
      </div>
    </div>
    <div class="calendar-panel">
      <div class="cal-wrapper">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-label"></div>
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">&#8592;</button>
            <button onclick="changeMonth(1)">&#8594;</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="review-rotator">
        <div class="review-slot" id="review-slot">
          <div class="review-stars-sm"></div>
          <p class="review-quote"></p>
        </div>
      </div>
    </div>
    <div class="form-panel">
      <div class="panel-title">Neue Reservierung</div>
      <div class="date-trigger" id="date-display" onclick="toggleDateDropdown()">
        📅 <span id="date-display-text">Bitte Datum wählen</span>
        <span class="dd-arrow" id="dd-arrow">▼</span>
        <div class="date-dropdown" id="date-dropdown" onclick="event.stopPropagation()">
          <div class="dd-cal-header">
            <div class="dd-cal-month" id="dd-month-label"></div>
            <div class="dd-nav">
              <button onclick="ddChangeMonth(-1)">&#8592;</button>
              <button onclick="ddChangeMonth(1)">&#8594;</button>
            </div>
          </div>
          <div class="dd-grid" id="dd-grid"></div>
        </div>
      </div>
      <form id="res-form" onsubmit="submitReservation(event)">
        <div class="form-row">
          <div class="form-group"><label>Vorname</label><input type="text" id="f-firstname" required></div>
          <div class="form-group"><label>Nachname</label><input type="text" id="f-lastname" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Telefon</label><input type="tel" id="f-phone" required></div>
          <div class="form-group"><label>Personen</label>
            <select id="f-guests" required onchange="onGuestsChange()">
              <option value=""></option>
              <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option value="10+">10+</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>E-Mail</label><input type="email" id="f-email" required></div>
        <div class="form-group"><label>Uhrzeit</label><select id="f-time" required><option value="">Wählen</option></select></div>
        <div class="form-group"><label>Notiz</label><textarea id="f-notes"></textarea></div>
        <button type="submit" class="btn-primary" id="submit-btn">Bestätigen</button>
      </form>
    </div>
  </div>
</main>

<div class="booking-popup" id="booking-popup">
  <div class="booking-popup-card">
    <h3 id="bp-name"></h3>
    <p id="bp-date"></p>
    <button onclick="location.reload()">Alles klar</button>
  </div>
</div>

<div class="toast" id="toast">
  <div id="toast-title"></div>
  <div id="toast-msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://syqhivfmqtqfnaxogrfp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5cWhpdmZtcXRxZm5heG9ncmZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDI1NzMsImV4cCI6MjA4NzAxODU3M30.Ctx5aBFcozWImqDgZul-o7MKCdNV6GAXpLNPO0AHo4c';

const OPEN_DAYS = { 3:1, 4:1, 5:1, 6:1 }; 
const DAY_CAPACITY = 50;
const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];

let reservations = [], blockedDates = [], selectedDate = null;
let currentMonth = new Date(), ddMonth = new Date();

async function sbFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return method === 'GET' ? res.json() : res;
}

async function loadData() {
  const [resData, blockData] = await Promise.all([sbFetch('GET', 'reservations?select=*'), sbFetch('GET', 'blocked_dates?select=date')]);
  reservations = resData || [];
  blockedDates = (blockData || []).map(r => r.date);
}

function formatDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
  document.getElementById('cal-month-label').textContent = monthNames[month] + ' ' + year;
  let startDow = new Date(year, month, 1).getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const dim = new Date(year, month + 1, 0).getDate();
  let html = dayNames.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  for(let i=0; i<startDow; i++) html += '<div class="cal-day empty"></div>';
  for(let d=1; d<=dim; d++) {
    const ds = formatDate(new Date(year, month, d));
    const isToday = ds === formatDate(new Date());
    html += `<div class="cal-day ${ds===selectedDate?'selected':''} ${isToday?'today':''}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  grid.innerHTML = html;
}

function renderDdCalendar() {
  const grid = document.getElementById('dd-grid');
  const year = ddMonth.getFullYear(), month = ddMonth.getMonth();
  document.getElementById('dd-month-label').textContent = monthNames[month] + ' ' + year;
  let startDow = new Date(year, month, 1).getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const dim = new Date(year, month + 1, 0).getDate();
  let html = dayNames.map(d => `<div class="dd-label">${d}</div>`).join('');
  for(let i=0; i<startDow; i++) html += '<div class="dd-day dd-empty"></div>';
  for(let d=1; d<=dim; d++) {
    const ds = formatDate(new Date(year, month, d));
    html += `<div class="dd-day ${ds===selectedDate?'dd-selected':''}" onclick="selectDate('${ds}'); toggleDateDropdown();">${d}</div>`;
  }
  grid.innerHTML = html;
}

function selectDate(ds) { 
  selectedDate = ds; 
  document.getElementById('date-display-text').textContent = ds;
  renderCalendar(); renderDdCalendar(); 
}

function toggleDateDropdown() { document.getElementById('date-dropdown').classList.toggle('open'); }

async function init() {
  await loadData();
  const today = formatDate(new Date());
  if(OPEN_DAYS[new Date().getDay()]) selectDate(today);
  renderCalendar();
}
init();

// Simple Rotator
(async function(){
  const slot = document.getElementById('review-slot');
  const fbRes = await fetch(SUPABASE_URL + '/rest/v1/feedback?select=overall_rating,comment&comment=not.is.null&limit=10', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  const data = await fbRes.json();
  let idx = 0;
  setInterval(() => {
    if(!data.length) return;
    const r = data[idx];
    slot.classList.remove('visible');
    setTimeout(() => {
      slot.querySelector('.review-stars-sm').textContent = '★'.repeat(r.overall_rating);
      slot.querySelector('.review-quote').textContent = '„' + r.comment + '“';
      slot.classList.add('visible');
      idx = (idx + 1) % data.length;
    }, 400);
  }, 5000);
})();
</script>
</body>
</html>
