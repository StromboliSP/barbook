<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birdyard — Tischreservierung</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='150 50 250 250'><rect x='200' y='68' width='145' height='214' fill='%239cb08f' rx='4' /><rect x='200' y='75' width='125' height='200' fill='%23fbf8ef' rx='2' /><text x='262' y='190' font-family='Montserrat, sans-serif' font-weight='900' font-size='85' fill='%2318181b' text-anchor='middle'>B</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@900&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: rgba(255,255,255,0.8);
    --accent-dim: rgba(255,255,255,0.06);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.4);
    --border: rgba(255,255,255,0.1);
    --brand-main: #9cb08f;
    --brand-dark: #7a8f6d;
    --page-color: #fbf8ef;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: url('https://i.imgur.com/vDRf0fc.jpg') center center / cover fixed no-repeat;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Header Styles */
  .card-header {
    background: #2e2a24;
    height: 75px;
    position: relative;
    border-bottom: 1px solid rgba(0,0,0,0.25);
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .card-header-logo-box {
    position: absolute;
    top: 25px;
    left: 1.8rem;
    z-index: 20;
    width: 95px;
    height: 95px;
    background: #1a1510;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(180,145,80,0.35);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .card-header-logo {
    width: 85px;
    height: 85px;
    object-fit: contain;
  }

  /* Animation für das Logo im Header */
  @keyframes openBook {
    0%, 20% { transform: rotateY(0deg); }
    40%, 60% { transform: rotateY(-180deg); }
    80%, 100% { transform: rotateY(0deg); }
  }
  .cover-top-layer {
    transform-origin: 200px 0;
    animation: openBook 6s ease-in-out infinite;
  }

  /* Main Layout */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 1rem 3rem;
    width: 100%;
  }

  .main-card {
    display: grid;
    grid-template-columns: 1fr;
    width: 100%;
    max-width: 480px;
    background: rgba(232, 220, 200, 0.95);
    box-shadow: 0 30px 90px rgba(0,0,0,0.6);
    overflow: visible;
  }

  @media (min-width: 900px) {
    .main-card {
      grid-template-columns: 1fr 1fr;
      max-width: 950px;
    }
  }

  /* Panel Content */
  .calendar-panel {
    padding: 4.5rem 1.8rem 1.6rem;
    display: flex;
    flex-direction: column;
  }

  .form-panel {
    padding: 2rem 1.8rem 2.5rem;
    background: rgba(237, 227, 210, 0.98);
    display: flex;
    flex-direction: column;
  }

  /* Form Elements */
  input, select, textarea {
    width: 100%;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(122, 92, 42, 0.15);
    padding: 0.8rem 0.7rem;
    margin-bottom: 1rem;
    font-family: inherit;
    font-size: 0.95rem;
    color: #2a1f0e;
    border-radius: 0;
  }

  label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8a7560;
    margin-bottom: 0.4rem;
    display: block;
  }

  .btn-primary {
    background: #1a1510;
    color: #fff;
    border: none;
    padding: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.3s;
  }

  /* Kalender-Grid Platzhalter (damit nichts verrutscht) */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
</style>
</head>
<body>

<main>
  <div class="main-card">
    <div class="card-header" style="grid-column: 1 / -1;">
      <div class="card-header-logo-box">
        <svg width="85" height="85" viewBox="150 50 250 250" xmlns="http://www.w3.org/2000/svg">
          <g class="cover-bottom-layer">
            <rect x="200" y="68" width="145" height="214" fill="#7a8f6d" rx="4" />
            <rect x="200" y="75" width="125" height="200" fill="#fbf8ef" rx="2" />
          </g>
          <rect x="200" y="68" width="145" height="214" fill="#7a8f6d" rx="4" />
          <rect x="200" y="75" width="125" height="200" fill="#fbf8ef" rx="2" />
          <g class="cover-top-layer">
            <rect x="200" y="68" width="145" height="214" fill="#9cb08f" rx="4" />
            <text x="272" y="190" font-family="Montserrat" font-weight="900" font-size="85" fill="#18181b" text-anchor="middle">B</text>
          </g>
        </svg>
      </div>
      <div style="padding-right: 1.8rem; color: white; font-family: Montserrat; font-weight: 900; letter-spacing: 2px;">BARBOOK</div>
    </div>

    <div class="calendar-panel">
      <label>Datum wählen</label>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="form-panel">
      <form id="res-form">
        <label>Vorname</label>
        <input type="text" id="fname" required>
        
        <label>Nachname</label>
        <input type="text" id="lname" required>
        
        <label>E-Mail</label>
        <input type="email" id="email" required>

        <label>Personen</label>
        <select id="guests">
          <option value="1">1 Person</option>
          <option value="2" selected>2 Personen</option>
          <option value="3">3 Personen</option>
          <option value="4">4 Personen</option>
        </select>

        <label>Uhrzeit</label>
        <select id="time">
          <option>18:00</option>
          <option>19:00</option>
          <option>20:00</option>
        </select>

        <button type="submit" class="btn-primary">Tisch anfragen</button>
      </form>
    </div>
  </div>
</main>

<script>
  // Dein bestehendes Kalender-Script hier einfügen...
</script>

</body>
</html>
