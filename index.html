<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birdyard — Tischreservierung</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P5JEYC4H25"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-P5JEYC4H25');
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: rgba(255,255,255,0.8);
    --accent-dim: rgba(255,255,255,0.06);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.4);
    --border: rgba(255,255,255,0.18);
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.03);
    --success: #55aa77;
    --danger: rgba(220,100,100,0.9);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: url('https://i.imgur.com/vDRf0fc.jpg') center center / cover fixed no-repeat;
    color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
    font-size: clamp(13px, 1.1vw, 17px);
  }
  main { display:flex; align-items:flex-start; justify-content:center; padding:0 1rem 3rem; width:100%; }
  
  /* --- ANGEPASSTER HEADER --- */
  .card-header {
    background:#2e2a24;
    padding:0.7rem 1.8rem; /* Schmaler Balken */
    display:flex;
    align-items:center;
    gap:1.2rem;
    border-bottom:1px solid rgba(0,0,0,0.25);
    position: relative;
    z-index: 10;
  }
  
  /* --- LOGO BOX MIT ÜBERLAPPUNG --- */
  .card-header-logo-box {
    width:115px; /* Größer */
    height:115px;
    background:#1a1510;
    border:1px solid rgba(180,145,80,0.35);
    box-shadow:0 8px 20px rgba(0,0,0,0.4), inset 0 0 8px rgba(0,0,0,0.4);
    border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; flex-shrink:0;
    position: relative;
    top: 35px; /* Schiebt es über den Rand */
    margin-bottom: -25px; /* Verhindert Leerraum */
    z-index: 11;
  }
  
  .card-header-logo { 
    width:115%; /* Zoom-Effekt */
    height:115%; 
    object-fit:cover; 
    display:block; 
  }

  .card-header-title {
    font-family:'DM Sans',sans-serif;
    font-size:0.75rem;
    font-weight:400;
    color:rgba(235,215,175,0.9);
    letter-spacing:0.3em;
    text-transform:uppercase;
  }
  .main-card {
    display:grid; grid-template-columns:1fr;
    width:100%; max-width:480px;
    background:#e8dcc8;
    box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(122,92,42,0.2);
    overflow:visible; /* Geändert von hidden auf visible für das Logo */
  }
  .calendar-panel { padding:2.5rem 1.8rem 1.6rem; border-bottom:1px solid rgba(122,92,42,0.15); background:#e8dcc8; }
  .form-panel { padding:1.6rem 1.8rem; background:#ede3d2; }

  /* ── DESKTOP ANPASSUNGEN ── */
  @media (min-width:900px) {
    body { font-size: clamp(13px, 1.1vw, 18px); }
    main { padding: clamp(1.5rem, 4vh, 4rem) clamp(1rem, 3vw, 3rem); align-items: center; min-height: 100vh; }
    .main-card { grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; max-width: clamp(700px, 68vw, 1000px); width: 100%; }
    .card-header { grid-column: 1 / -1; }
    .card-header-logo-box { width: 140px; height: 140px; top: 45px; }
    .calendar-panel { border-bottom: none; border-right: 1px solid rgba(122,92,42,0.15); padding-top: 4rem; }
  }

  /* Restliches Design bleibt gleich... */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; }
  .cal-month { font-family:'DM Sans',sans-serif; font-size:0.62rem; font-weight:400; letter-spacing:0.3em; text-transform:uppercase; color:#8a7560; }
  .cal-nav { display:flex; gap:0.3rem; }
  .cal-nav button { background:transparent; border:1px solid rgba(122,92,42,0.25); color:#8a7560; width:26px; height:26px; border-radius:0; cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-day-label { text-align:center; font-size:0.6rem; font-weight:400; letter-spacing:0.07em; text-transform:uppercase; color:#8a7560; padding-bottom:0.4rem; }
  .cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-size:0.82rem; color:#2a1f0e; border:1px solid transparent; position:relative; }
  .cal-day.selected { background:rgba(122,92,42,0.15); border-color:#7a5c2a; }
  .cal-day.today { color:#7a5c2a; font-weight:700; }
  .panel-title { font-family:'DM Sans',sans-serif; font-size:0.62rem; font-weight:400; letter-spacing:0.3em; text-transform:uppercase; color:#8a7560; }
  .date-trigger { background:rgba(122,92,42,0.08); border:1px solid rgba(122,92,42,0.2); padding:0.5rem 0.7rem; margin-bottom:0.9rem; font-size:0.82rem; display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
  .form-group { margin-bottom:0.9rem; }
  input, select, textarea { width:100%; background:rgba(255,255,255,0.5); border:1px solid rgba(122,92,42,0.2); padding:0.5rem 0.7rem; font-family:'DM Sans',sans-serif; font-size:0.82rem; outline:none; }
  .btn-primary { width:100%; background:#1a1510; color:rgba(235,220,195,0.9); border:1px solid rgba(235,220,195,0.35); padding:0.8rem; font-size:0.68rem; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; }
</style>
</head>
<body>
<main>
  <div class="main-card">
    <div class="card-header">
      <div class="card-header-logo-box">
        <img src="https://i.imgur.com/vDRf0fc.jpg" class="card-header-logo">
      </div>
      <div class="card-header-title">Tischreservierung</div>
    </div>
    <div class="calendar-panel">
      <div class="cal-header">
        <div class="cal-month">Februar 2026</div>
      </div>
      <div class="cal-grid">
        </div>
    </div>
    <div class="form-panel">
      <div class="panel-title">Neue Reservierung</div>
      <form id="res-form">
        <div class="form-group">
          <label>Vorname</label>
          <input type="text" required>
        </div>
        <div class="form-group">
          <label>Nachname</label>
          <input type="text" required>
        </div>
        <button type="submit" class="btn-primary">Reservierung bestätigen</button>
      </form>
    </div>
  </div>
</main>
</body>
</html>
