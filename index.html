<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birdyard — Tischreservierung</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 540 350'><rect x='200' y='68' width='145' height='214' fill='%239cb08f' rx='4' /><rect x='200' y='75' width='125' height='200' fill='%23fbf8ef' rx='2' /><text x='262' y='190' font-family='Montserrat, sans-serif' font-weight='900' font-size='85' fill='%2318181b' text-anchor='middle'>B</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --brand-main: #9cb08f;
            --brand-dark: #7a8f6d;
            --page-color: #fbf8ef;
            --text-color: #18181b;
            --bg-overlay: rgba(232, 220, 200, 0.95);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('https://i.imgur.com/vDRf0fc.jpg') center center / cover fixed no-repeat;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER & LOGO ANIMATION */
        .card-header {
            background: #2e2a24;
            height: 90px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.8rem;
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .card-header-logo-box {
            width: 80px;
            height: 80px;
            background: #1a1510;
            border: 1px solid rgba(180,145,80,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .barbook-logo-svg {
            height: 50px;
            width: auto;
        }

        /* MAIN LAYOUT */
        main {
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            width: 100%;
        }

        .main-card {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            max-width: 950px;
            background: var(--bg-overlay);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .calendar-panel { padding: 2rem; background: #e8dcc8; }
        .form-panel { padding: 2rem; background: #ede3d2; }

        /* HELLER BEREICH FÜR KALENDER */
        .cal-wrapper {
            background: #ffffff;
            border: 1px solid rgba(122,92,42,0.1);
            padding: 1.5rem;
            border-radius: 2px;
            margin-bottom: 2rem;
        }

        /* TIME PILLS */
        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a7560;
            margin-bottom: 12px;
            display: block;
            font-weight: 600;
        }
        .time-pills-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }
        .time-pill {
            background: #fff;
            border: 1px solid rgba(122,92,42,0.2);
            padding: 12px 5px;
            text-align: center;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2e2a24;
        }
        .time-pill.selected {
            background: #2e2a24;
            color: #fff;
            border-color: #2e2a24;
            transform: translateY(-2px);
        }
        .time-pill.disabled { opacity: 0.2; cursor: not-allowed; text-decoration: line-through; }

        /* FLOATING LABELS */
        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #ffffff;
            border: 1px solid rgba(122,92,42,0.2);
            padding: 24px 12px 8px 12px;
            font-size: 1rem;
            outline: none;
        }
        .form-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a7560;
            transition: all 0.2s ease;
            pointer-events: none;
        }
        .form-group input:focus ~ label,
        .form-group input:not(:placeholder-shown) ~ label {
            top: 8px;
            transform: translateY(0);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--brand-dark);
        }

        .btn-primary {
            width: 100%;
            padding: 1.2rem;
            background: #1a1510;
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-primary:hover { background: #3a3229; }

        @media (min-width: 900px) {
            .main-card { grid-template-columns: 1fr 1fr; }
        }

        /* ANIMATIONEN FÜR DAS LOGO */
        @keyframes openBook { 
            0%, 20% { transform: rotateY(0deg); } 
            40%, 60% { transform: rotateY(-180deg); } 
            80%, 100% { transform: rotateY(0deg); } 
        }
        .cover-top-layer { 
            transform-origin: 200px 0; 
            animation: openBook 6s ease-in-out infinite; 
        }
    </svg>
    </style>
</head>
<body>

<header class="card-header">
    <div class="card-header-logo-box">
        <svg class="barbook-logo-svg" viewBox="150 50 250 250" xmlns="http://www.w3.org/2000/svg">
            <g class="cover-bottom-layer">
                <rect x="200" y="68" width="145" height="214" fill="#7a8f6d" rx="4" />
                <rect x="200" y="75" width="125" height="200" fill="#fbf8ef" rx="2" />
            </g>
            <rect x="200" y="68" width="145" height="214" fill="#7a8f6d" rx="4" />
            <rect x="200" y="75" width="125" height="200" fill="#fbf8ef" rx="2" />
            <g class="cover-top-layer">
                <rect x="200" y="68" width="145" height="214" fill="#9cb08f" rx="4" />
                <text x="272" y="190" font-family="Montserrat" font-weight="900" font-size="85" fill="#18181b" text-anchor="middle">B</text>
            </g>
        </svg>
    </div>
    <div style="color: #fff; font-family: 'Montserrat'; font-weight: 900; letter-spacing: 2px;">BARBOOK</div>
</header>

<main>
    <div class="main-card">
        <div class="calendar-panel">
            <div class="cal-wrapper">
                <p style="color:#8a7560; font-size:0.7rem; text-transform:uppercase; margin-bottom:1rem;">Datum wählen</p>
                <div style="height: 200px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ccc;">
                    Kalender-Modul
                </div>
            </div>
            
            <span class="time-label">Uhrzeit</span>
            <div class="time-pills-container" id="time-pills">
                <div class="time-pill">18:00</div>
                <div class="time-pill">18:30</div>
                <div class="time-pill selected">19:00</div>
                <div class="time-pill">19:30</div>
                <div class="time-pill">20:00</div>
                <div class="time-pill disabled">20:30</div>
                <div class="time-pill">21:00</div>
                <div class="time-pill">21:30</div>
            </div>
        </div>

        <div class="form-panel">
            <form id="res-form">
                <div class="form-group">
                    <input type="text" id="fname" placeholder=" " required>
                    <label>Vorname</label>
                </div>
                <div class="form-group">
                    <input type="text" id="lname" placeholder=" " required>
                    <label>Nachname</label>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label>E-Mail Adresse</label>
                </div>
                <div class="form-group">
                    <textarea id="notes" placeholder=" " rows="3"></textarea>
                    <label>Notizen & Wünsche</label>
                </div>
                <button type="submit" class="btn-primary">Jetzt reservieren</button>
            </form>
            <p style="font-size: 0.65rem; color: #8a7560; margin-top: 1rem; text-align: center;">
                Keine Reservierungsgebühr. Bestätigung erfolgt sofort.
            </p>
        </div>
    </div>
</main>

<script>
    // Einfache Interaktion für die Time-Pills
    document.querySelectorAll('.time-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            if (!pill.classList.contains('disabled')) {
                document.querySelectorAll('.time-pill').forEach(p => p.classList.remove('selected'));
                pill.classList.add('selected');
            }
        });
    });

    // Guerilla-Tracking: Woher kommt der Gast?
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('source') === 'google') {
        console.log("Gast kommt via Google Maps Guerilla-Link");
        // Hier könntest du eine spezielle VIP-Begrüßung einbauen
    }
</script>

</body>
</html>
